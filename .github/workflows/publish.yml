name: Publish to PyPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.project.outputs.name }}
      package_version: ${{ steps.project.outputs.version }}
      should_publish: ${{ steps.version_check.outputs.should_publish }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read project metadata
        id: project
        shell: python
        run: |
          import os
          import pathlib
          import tomllib

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]

          with pathlib.Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
              print(f"name={project['name']}", file=fh)
              print(f"version={project['version']}", file=fh)

      - name: Check whether version already exists on PyPI
        id: version_check
        env:
          PACKAGE_NAME: ${{ steps.project.outputs.name }}
          PACKAGE_VERSION: ${{ steps.project.outputs.version }}
        shell: python
        run: |
          import os
          import pathlib
          import urllib.error
          import urllib.request

          package_name = os.environ["PACKAGE_NAME"]
          package_version = os.environ["PACKAGE_VERSION"]
          url = f"https://pypi.org/pypi/{package_name}/{package_version}/json"
          exists = False

          try:
              with urllib.request.urlopen(url) as response:
                  exists = response.status == 200
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          with pathlib.Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
              print(f"should_publish={'false' if exists else 'true'}", file=fh)

          if exists:
              print(
                  f"{package_name} {package_version} already exists on PyPI. "
                  "Skipping publication for this push."
              )
          else:
              print(f"{package_name} {package_version} is not on PyPI yet. Proceeding.")

  build_distributions:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: release_metadata
    if: needs.release_metadata.outputs.should_publish == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build

      - name: Verify distribution metadata
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*

  publish_to_pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - release_metadata
      - build_distributions
    if: needs.release_metadata.outputs.should_publish == 'true'
    environment:
      name: pypi
      url: https://pypi.org/project/${{ needs.release_metadata.outputs.package_name }}/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  already_published:
    name: Skip duplicate release
    runs-on: ubuntu-latest
    needs: release_metadata
    if: needs.release_metadata.outputs.should_publish != 'true'
    steps:
      - name: Explain skip
        run: |
          echo "Version ${{ needs.release_metadata.outputs.package_version }} is already on PyPI."
          echo "Bump project.version in pyproject.toml to publish a new release."
